spring.application.name=customer-service
server.port=8082

# Kafka Broker Address
spring.kafka.consumer.bootstrap-servers=localhost:9092

# Consumer Group ID (Interview tip: Consumers with the same Group ID share the load)
spring.kafka.consumer.group-id=group-1

# Add Producer Configs for DLQ
spring.kafka.producer.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# How to turn bytes back into Java Strings
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.trusted.packages=*

# Tell the consumer to ignore the type information sent in the headers
spring.kafka.consumer.properties.spring.json.use.type.headers=false

# Explicitly tell it which local class to use for the value
spring.kafka.consumer.properties.spring.json.value.default.type=com.swiftride.customer_service.Entities.LocationData

# Read from the beginning if the service starts late
spring.kafka.consumer.auto-offset-reset=earliest

# H2 Database Config
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Enable H2 Console at /h2-console
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql = true